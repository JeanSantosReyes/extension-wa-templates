<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA Quick Templates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.1-1.34C8.53 21.53 10.22 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#25D366"/>
            <path d="M17 14.5c-.28-.14-1.65-.81-1.9-.9-.26-.1-.44-.14-.63.14-.19.28-.72.9-.88 1.08-.16.19-.32.21-.6.07-.28-.14-1.18-.44-2.25-1.4-.83-.74-1.39-1.65-1.56-1.93-.16-.28-.02-.43.12-.57.13-.13.28-.32.42-.49.14-.17.19-.28.28-.47.1-.19.05-.35-.02-.49-.07-.14-.63-1.52-.86-2.08-.23-.54-.46-.47-.63-.47-.17 0-.35-.02-.54-.02-.19 0-.49.07-.74.35-.26.28-.98.95-.98 2.33 0 1.37 1 2.7 1.14 2.89.14.19 1.97 3 4.77 4.21.67.29 1.19.46 1.6.59.67.21 1.28.18 1.76.11.54-.08 1.65-.67 1.88-1.32.23-.65.23-1.2.16-1.32-.07-.12-.26-.19-.54-.33z" fill="white"/>
          </svg>
        </div>
        <div class="title-block">
          <h1>Quick Templates</h1>
          <span class="subtitle">WhatsApp Web</span>
        </div>
      </div>
      <button class="btn-add" id="btnNewTemplate" title="Nuevo template">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar templates...">
    </div>

    <!-- Template list -->
    <div class="template-list" id="templateList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📝</div>
        <p>No hay templates todavía</p>
        <small>Crea tu primer template con el botón +</small>
      </div>
    </div>

    <!-- Form Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="templateModal">
        <div class="modal-header">
          <h2 id="modalTitle">Nuevo Template</h2>
          <button class="btn-close" id="btnCloseModal">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>Nombre del template</label>
            <input type="text" id="templateName" placeholder="Ej: Bienvenida cliente">
          </div>
          <div class="field">
            <label>Mensaje de texto <span class="optional">(opcional)</span></label>
            <textarea id="templateText" placeholder="Escribe tu mensaje aquí..." rows="4"></textarea>
            <div class="char-count"><span id="charCount">0</span> caracteres</div>
          </div>
          <div class="field">
            <label>Imagen <span class="optional">(opcional)</span></label>
            <div class="image-upload-area" id="imageUploadArea">
              <input type="file" id="imageInput" accept="image/*" style="display:none">
              <div class="upload-placeholder" id="uploadPlaceholder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                <span>Haz clic o arrastra una imagen</span>
              </div>
              <div class="image-preview" id="imagePreview" style="display:none">
                <img id="previewImg" src="" alt="Preview">
                <button class="remove-img" id="removeImage">✕</button>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="btnCancel">Cancelar</button>
          <button class="btn-save" id="btnSave">Guardar Template</button>
        </div>
      </div>
    </div>

    <!-- Delete confirm -->
    <div class="modal-overlay" id="deleteOverlay">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h2>Eliminar template</h2>
        </div>
        <div class="modal-body">
          <p>¿Seguro que quieres eliminar <strong id="deleteTemplateName"></strong>?</p>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="btnCancelDelete">Cancelar</button>
          <button class="btn-delete" id="btnConfirmDelete">Eliminar</button>
        </div>
      </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
